name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          
      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "lokeshsharma0@users.noreply.github.com"
          git config --global user.name "lokeshsharma0"
          git push --force https://Lowkey333:$HF_TOKEN@huggingface.co/spaces/Lowkey333/CYBERGUARD main
