name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]

  # Allows you to manually trigger this sync from the Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://lokeshsharma0:$HF_TOKEN@huggingface.co/spaces/lokeshsharma0/cyberguard main
